<body>
    <!-- Welcome Bar - will be shown only if user is logged in -->
    <div class="welcome-bar" id="welcomeBar" style="display: none;">
        <div class="welcome-text">
            <i class="fas fa-user-circle"></i>
            Welcome, <span id="displayName">User</span>!
        </div>
        <button class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            Logout
        </button>
    </div>

    <h1>Algorithm Visualizer</h1>
    
    <h2>Sorting Algorithms</h2>
    <div class="container">
        <div class="card"><a href="bubble.html">Bubble Sort</a></div>
        <div class="card"><a href="selection.html">Selection Sort</a></div>
        <div class="card"><a href="insertion.html">Insertion Sort</a></div>
        <div class="card"><a href="merge.html">Merge Sort</a></div>
        <div class="card"><a href="quick.html">Quick Sort</a></div>
    </div>

    <h2>Searching Algorithms</h2>
    <div class="container">
        <div class="card"><a href="linear.html">Linear Search</a></div>
        <div class="card"><a href="binary.html">Binary Search</a></div>
    </div>

    <script>
        // Check if user is logged in when main.html loads
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user'));
            const welcomeBar = document.getElementById('welcomeBar');
            const displayName = document.getElementById('displayName');
            
            if (user) {
                // User is logged in - show welcome bar
                welcomeBar.style.display = 'flex';
                displayName.textContent = user.username || 'User';
            } else {
                // User is not logged in - redirect to login page
                window.location.href = '/index.html';
            }
            
            // Logout functionality
            document.getElementById('logoutBtn').addEventListener('click', () => {
                // Clear all user data
                localStorage.removeItem('user');
                localStorage.removeItem('username');
                sessionStorage.removeItem('user');
                sessionStorage.removeItem('username');
                
                // Redirect to login page
                window.location.href = '/index.html';
            });
        });
    </script>
</body>

</html>
